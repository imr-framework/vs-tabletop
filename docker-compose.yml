services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vst}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vstpass}
      POSTGRES_DB: ${POSTGRES_DB:-vstabletop}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20

  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      PORT: "8080"
      # Resolved by scripts/build_database_url.py (URL-encodes password; sslmode=disable for in-network db)
      POSTGRES_HOST: db
      POSTGRES_INTERNAL_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-vst}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vstpass}
      POSTGRES_DB: ${POSTGRES_DB:-vstabletop}
      # Clerk (optional): set in .env next to this file
      CLERK_ENABLED: ${CLERK_ENABLED:-false}
      CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY:-}
      CLERK_ISSUER: ${CLERK_ISSUER:-}
      CLERK_JWKS_URL: ${CLERK_JWKS_URL:-}
      CLERK_FRONTEND_API: ${CLERK_FRONTEND_API:-}
      # App security/runtime settings
      SECRET_KEY: ${SECRET_KEY:-}
      WTF_CSRF_SECRET_KEY: ${WTF_CSRF_SECRET_KEY:-}
      SESSION_COOKIE_SECURE: "0"
      SESSION_COOKIE_SAMESITE: ${SESSION_COOKIE_SAMESITE:-Lax}
      # For deployment, disable auto schema creation and run migrations/init explicitly.
      AUTO_DB_INIT: ${AUTO_DB_INIT:-0}
      INIT_ADMIN: ${INIT_ADMIN:-0}

volumes:
  pgdata:
